openapi: 3.1.0
info:
  title: Adoption Service API
  description: API for managing pets, pet pictures, and adoption applications.
  version: 1.0.0
  contact:
    name: Adoption Service Team
    email: support@example.com
servers:
  - url: http://localhost:8080
paths:
  /pets:
    get:
      summary: List pets with optional filters
      description: >-
        Returns pets filtered by the provided parameters.
        When no status parameter is provided, only AVAILABLE pets are returned.
      parameters:
        - name: species
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/Species'
        - name: breed
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/Breed'
        - name: minAgeMonths
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
          description: Minimum age in months (inclusive)
        - name: maxAgeMonths
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
          description: Maximum age in months (inclusive)
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/PetStatus'
          description: Pet status filter. Defaults to AVAILABLE when omitted.
      responses:
        '200':
          description: Filtered list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PetResponse'
    post:
      summary: Create a new pet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PetCreateRequest'
      responses:
        '201':
          description: Created pet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PetResponse'
      security:
        - basicAuth: []
  /pets/{petId}:
    parameters:
      - name: petId
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      summary: Get pet details
      responses:
        '200':
          description: Pet details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PetResponse'
        '404':
          description: Pet not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: Partially update a pet
      description: >-
        Applies a partial update to a pet. Any provided fields are updated.
        When the pictures array is provided, it is merged with the existing picture list:
        matching pictures remain, missing pictures are removed, and new pictures are added.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchPetRequest'
      responses:
        '200':
          description: Updated pet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PetResponse'
        '404':
          description: Pet not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - basicAuth: []
  /pets/{petId}/pictures:
    parameters:
      - name: petId
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      summary: List picture IDs for a pet
      responses:
        '200':
          description: Picture identifiers
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer
                  format: int64
        '404':
          description: Pet not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /pets/{petId}/pictures/{pictureId}:
    parameters:
      - name: petId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: pictureId
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      summary: Get a picture by ID for a pet
      responses:
        '200':
          description: Picture binary data
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
        '404':
          description: Picture or pet not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /applications:
    post:
      summary: Submit an adoption application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationCreateRequest'
      responses:
        '201':
          description: Created application
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationResponse'
  /applications/{applicationId}:
    parameters:
      - name: applicationId
        in: path
        required: true
        schema:
          type: integer
          format: int64
    patch:
      summary: Update an adoption application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationUpdateRequest'
      responses:
        '200':
          description: Updated application
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationResponse'
        '404':
          description: Application not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - basicAuth: []
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  schemas:
    PetCreateRequest:
      type: object
      required:
        - name
        - species
        - status
        - pictures
      example:
        name: Milo
        species: FELINE
        breed: SIAMESE
        ageMonths: 12
        description: Friendly cat
        status: AVAILABLE
        pictures:
          - iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAACklEQVR4nGMAAIAAG4hWK5AAAAAElFTkSuQmCC
      properties:
        name:
          type: string
        species:
          $ref: '#/components/schemas/Species'
        breed:
          $ref: '#/components/schemas/Breed'
          nullable: true
        ageMonths:
          type: integer
          format: int32
          nullable: true
        description:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/PetStatus'
        pictures:
          type: array
          items:
            type: string
            format: binary
    PetUpdateRequest:
      type: object
      description: >-
        Full replacement request for a pet. All fields are required and the request replaces the pet record.
        The pictures array replaces the existing picture list for the pet.
      required:
        - name
        - species
        - breed
        - ageMonths
        - description
        - status
        - pictures
      properties:
        name:
          type: string
        species:
          $ref: '#/components/schemas/Species'
        breed:
          $ref: '#/components/schemas/Breed'
        ageMonths:
          type: integer
          format: int32
        description:
          type: string
        status:
          $ref: '#/components/schemas/PetStatus'
        pictures:
          type: array
          items:
            type: string
            format: binary
    PatchPetRequest:
      type: object
      description: >-
        Partial update request for a pet. Any field may be omitted. When the pictures array is included,
        it is merged with the existing picture list.
      properties:
        name:
          type: string
        species:
          $ref: '#/components/schemas/Species'
        breed:
          $ref: '#/components/schemas/Breed'
          nullable: true
        ageMonths:
          type: integer
          format: int32
          nullable: true
        description:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/PetStatus'
        pictures:
          type: array
          items:
            type: string
            format: binary
    PetResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        species:
          $ref: '#/components/schemas/Species'
        breed:
          $ref: '#/components/schemas/Breed'
          nullable: true
        ageMonths:
          type: integer
          format: int32
          nullable: true
        description:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/PetStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        pictureCount:
          type: integer
          format: int32
    PetStatus:
      type: string
      enum:
        - AVAILABLE
        - PENDING
        - ADOPTED
    Species:
      type: string
      enum:
        - FELINE
        - CANINE
    Breed:
      type: string
      enum:
        - SIAMESE
        - PERSIAN
        - MAINE_COON
        - RAGDOLL
        - BENGAL
        - BRITISH_SHORTHAIR
        - ABYSSINIAN
        - RUSSIAN_BLUE
        - LABRADOR
        - GERMAN_SHEPHERD
        - POODLE
        - BULLDOG
        - BEAGLE
        - GOLDEN_RETRIEVER
        - FRENCH_BULLDOG
        - MIXED
    ApplicationCreateRequest:
      type: object
      required:
        - petId
        - applicantName
        - applicantEmail
        - applicantPhone
      properties:
        petId:
          type: integer
          format: int64
        applicantName:
          type: string
        applicantEmail:
          type: string
          format: email
        applicantPhone:
          type: string
        message:
          type: string
          nullable: true
    ApplicationUpdateRequest:
      type: object
      required:
        - status
      properties:
        status:
          $ref: '#/components/schemas/ApplicationStatus'
        reviewNotes:
          type: string
          nullable: true
    ApplicationResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        petId:
          type: integer
          format: int64
        applicantName:
          type: string
        applicantEmail:
          type: string
          format: email
        applicantPhone:
          type: string
        message:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/ApplicationStatus'
        reviewNotes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ApplicationStatus:
      type: string
      enum:
        - PENDING
        - NEEDS_INFO
        - APPROVED
        - REJECTED
    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
