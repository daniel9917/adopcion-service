services:
  postgres:
    image: postgres:16-alpine
    container_name: adoption-postgres
    environment:
      POSTGRES_DB: adoptiondb
      POSTGRES_USER: adoption
      POSTGRES_PASSWORD: adoption123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adoption -d adoptiondb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: